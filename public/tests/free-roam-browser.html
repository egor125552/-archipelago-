<!doctype html>
<meta charset="utf-8">
<title>Free roam browser tests</title>
<pre id="result">RUNNING</pre>
<script type="module">
import {createFreeWorld, drainEvents, setPlayerInput, stepFreeWorld, WORLD} from "../src/free-roam-core-v2.js";
const lines = [];
function check(value, label) {
  if (!value) throw new Error(label);
  lines.push(`PASS ${label}`);
}
function near(actual, expected, tolerance, label) {
  check(Math.abs(actual - expected) <= tolerance, `${label}: ${actual.toFixed(3)} ≈ ${expected.toFixed(3)}`);
}
function stepMany(world, seconds, dt=.05) {
  for (let elapsed=0; elapsed<seconds; elapsed+=dt) stepFreeWorld(world, dt);
}
try {
  {
    const w = createFreeWorld();
    w.boats[0].x = 180; w.boats[0].y = 150;
    w.boats[1].x = 198; w.boats[1].y = 150;
    setPlayerInput(w, 0, {action:true}); stepFreeWorld(w,.05);
    setPlayerInput(w, 0, {}); stepFreeWorld(w,.05);
    check(Boolean(w.tow), "F attaches a physical tow rope");
    const beforeX = w.boats[1].x;
    const beforeY = w.boats[1].y;
    setPlayerInput(w,0,{up:true}); stepMany(w,3);
    check(Math.hypot(w.boats[1].x-beforeX, w.boats[1].y-beforeY) > .2, "tower physically drags the second boat");
    w.boats[1].hull = 45; w.boats[1].leak = 4;
    const hull = w.boats[1].hull;
    const patches = w.boats[1].repairPatches;
    setPlayerInput(w,1,{repair:true}); stepMany(w,3.35);
    near(w.boats[1].hull, hull + 22, .05, "towed plate restores the operation hull amount");
    check(w.boats[1].repairPatches === patches - 1, "towed repair consumes one familiar plate");
  }
  {
    const w = createFreeWorld();
    w.boats[0].x = 180; w.boats[0].y = 150;
    w.boats[1].x = 198; w.boats[1].y = 150;
    setPlayerInput(w,0,{action:true}); stepFreeWorld(w,.05);
    setPlayerInput(w,0,{up:true});
    w.boats[1].heading = 90;
    setPlayerInput(w,1,{up:true});
    stepMany(w,5);
    check(!w.tow, "opposing the tow eventually snaps the rope");
  }
  {
    const w = createFreeWorld();
    w.boats[0].x = 200; w.boats[0].y = 160; w.boats[0].speed = 12; w.boats[0].heading = 90;
    w.boats[1].x = 210; w.boats[1].y = 160; w.boats[1].speed = 10; w.boats[1].heading = 270;
    const hull = w.boats[0].hull;
    stepFreeWorld(w,.05);
    check(w.boats[0].hull < hull && w.boats[1].hull < 100, "boats damage each other by ramming");
  }
  {
    const w = createFreeWorld();
    const boat = w.boats[0];
    boat.water = 20;
    boat.leak = 3;
    setPlayerInput(w,0,{pump:true});
    stepMany(w,1);
    near(boat.water, 20 + 3*.33 - 7.5, .08, "manual pump keeps the operation flow rate");
  }
  {
    const w = createFreeWorld();
    const boat = w.boats[0];
    boat.water = 100;
    boat.hull = .05;
    stepFreeWorld(w,.05);
    check(boat.emergencyActive && boat.emergencyRemaining > 44, "full flooding opens the familiar 45 second recovery window");
    setPlayerInput(w,0,{pump:true,repair:true});
    stepMany(w,10);
    check(!boat.emergencyActive && !boat.sunk, "pump and plate recover the boat before the emergency expires");
    check(drainEvents(w).some(event => event.type === "flood-emergency-recovered"), "recovery emits the existing emergency sound event");
  }
  {
    const w = createFreeWorld();
    w.boats[0].x = (WORLD.dockMinX + WORLD.dockMaxX)/2;
    w.boats[0].y = WORLD.shoreY + 10;
    setPlayerInput(w,0,{action:true}); stepFreeWorld(w,.05);
    check(w.players[0].mode === "foot", "F exits onto the dock");
    w.players[0].x = w.boats[1].x; w.players[0].y = w.boats[1].y;
    w.boats[1].driver = null;
    setPlayerInput(w,0,{action:false}); stepFreeWorld(w,.05);
    setPlayerInput(w,0,{jump:true}); stepFreeWorld(w,.05);
    check(w.players[0].mode === "roof", "Space climbs onto a boat roof");
    setPlayerInput(w,0,{jump:false}); stepFreeWorld(w,.05);
    setPlayerInput(w,0,{action:true}); stepFreeWorld(w,.05);
    check(w.players[0].mode === "boat" && w.players[0].activeBoat === 1, "F steals an abandoned boat");
  }
  document.querySelector('#result').textContent = `PASS\n${lines.join('\n')}`;
  document.body.dataset.result = 'pass';
} catch (error) {
  document.querySelector('#result').textContent = `FAIL\n${error.stack || error}`;
  document.body.dataset.result = 'fail';
}
</script>

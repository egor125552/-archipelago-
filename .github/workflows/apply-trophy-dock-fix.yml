name: Apply trophy dock fix

on:
  push:
    branches:
      - agent/fix-trophy-dock
    paths:
      - .github/workflows/apply-trophy-dock-fix.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-trophy-dock

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Patch trophy guidance and dock tolerance
        run: |
          python3 - <<'PY'
          from pathlib import Path

          scenario = Path('public/src/free-roam-scenario.js')
          text = scenario.read_text()
          old = '''  if (scenario.phase === "victory") {
            const prize = nearestWorldCrate(world, playerIndex, crate => crate.source === "pursuer" || crate.source === "marauder");
            if (prize) return {
              id: prize.id,
              kind: prize.kind,
              label: "трофей преследователя",
              x: prize.x,
              y: prize.y,
            };
          }
          return dockTarget(world.players[playerIndex]);'''
          new = '''  if (scenario.phase === "victory") {
            if (cargoNeedsDock(world, playerIndex)) return dockTarget(world.players[playerIndex]);
            const prize = nearestWorldCrate(world, playerIndex, crate => crate.source === "pursuer" || crate.source === "marauder");
            if (prize) return {
              id: prize.id,
              kind: prize.kind,
              label: "трофей преследователя",
              x: prize.x,
              y: prize.y,
            };
            return null;
          }
          return dockTarget(world.players[playerIndex]);'''
          if old not in text:
              raise SystemExit('victory target block not found')
          scenario.write_text(text.replace(old, new, 1))

          rules = Path('public/src/free-roam-cargo-rules.js')
          text = rules.read_text()
          old = 'export const DOCK_BOAT_MAX_SPEED = 2;'
          new = 'export const DOCK_BOAT_MAX_SPEED = 6;'
          if old not in text:
              raise SystemExit('dock speed constant not found')
          rules.write_text(text.replace(old, new, 1))
          PY

      - name: Add regression tests
        run: |
          cat > tests/free-roam-trophy-delivery.test.mjs <<'EOF'
          import test from "node:test";
          import assert from "node:assert/strict";

          import {
            createFreeWorld,
            setPlayerInput,
            stepFreeWorld,
          } from "../public/src/free-roam-core-v6.js";
          import {spawnRareCrate} from "../public/src/free-roam-activities.js";
          import {scenarioTarget} from "../public/src/free-roam-scenario.js";

          function run(world, seconds, dt = 0.05) {
            for (let elapsed = 0; elapsed < seconds; elapsed += dt) stepFreeWorld(world, dt);
          }

          function tapAction(world) {
            setPlayerInput(world, 0, {action: true});
            run(world, 0.05);
            setPlayerInput(world, 0, {action: false});
            run(world, 0.05);
          }

          test("a pursuer trophy loads, unloads at the dock, and stops pointing to the dock afterward", () => {
            const world = createFreeWorld();
            const player = world.players[0];
            const boat = world.boats[player.activeBoat];
            world.freeScenario.phase = "victory";

            const trophy = spawnRareCrate(world, boat.x, boat.y, "ammo", "pursuer");
            tapAction(world);

            assert.equal(trophy.state, "stowed");
            assert.ok(boat.cargo.includes(trophy.id));
            assert.equal(scenarioTarget(world, 0)?.kind, "dock");

            boat.x = 210;
            boat.y = 90;
            boat.speed = 5;
            run(world, 0.6);

            assert.equal(boat.cargo.length, 0);
            assert.equal(trophy.state, "consumed");
            assert.equal(world.players[0].combat.ammo, 30);
            assert.equal(scenarioTarget(world, 0), null);
          });

          test("victory does not invent a dock target when no trophy is being carried", () => {
            const world = createFreeWorld();
            world.freeScenario.phase = "victory";
            for (const crate of world.freeActivities.crates) {
              crate.state = "consumed";
              crate.carriedBy = null;
              crate.stowedBoat = null;
            }
            for (const boat of world.boats) boat.cargo = [];

            assert.equal(scenarioTarget(world, 0), null);
          });
          EOF

      - name: Run tests
        run: npm test

      - name: Commit verified fix
        run: |
          git config user.name "OpenAI"
          git config user.email "openai@users.noreply.github.com"
          git rm .github/workflows/apply-trophy-dock-fix.yml
          git add public/src/free-roam-scenario.js public/src/free-roam-cargo-rules.js tests/free-roam-trophy-delivery.test.mjs
          git commit -m "fix: unload pursuer trophies reliably"
          git push origin HEAD:agent/fix-trophy-dock

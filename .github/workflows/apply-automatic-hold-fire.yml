name: Apply automatic hold-fire gesture

on:
  push:
    branches:
      - agent/automatic-hold-fire
    paths:
      - .github/workflows/apply-automatic-hold-fire.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/automatic-hold-fire
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Patch gesture controls, combat latch and help text
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(path, old, new):
              file = Path(path)
              text = file.read_text(encoding="utf-8")
              if old not in text:
                  raise SystemExit(f"missing pattern in {path}: {old[:120]!r}")
              file.write_text(text.replace(old, new, 1), encoding="utf-8")

          replace_once(
              "public/src/free-roam-action-gestures.js",
              'const HOLD_TIME = 520;\n\nexport function classifyActionGesture',
              '''const HOLD_TIME = 520;

export function shouldHoldAutomaticFire({pointers, equipped, hasAutomatic, ammo, targetMenuOpen = false}) {
  return Number(pointers) === 3
    && equipped === "automatic"
    && Boolean(hasAutomatic)
    && Number(ammo) > 0
    && !targetMenuOpen;
}

export function classifyActionGesture''',
          )

          replace_once(
              "public/src/free-roam-v4.js",
              'import {classifyActionGesture, gestureMetrics} from "./free-roam-action-gestures.js";',
              'import {classifyActionGesture, gestureMetrics, shouldHoldAutomaticFire} from "./free-roam-action-gestures.js?v=36";',
          )
          replace_once(
              "public/src/free-roam-v4.js",
              'let touchGroup = null;\nlet gestureDirection = null;\nlet gestureMode',
              'let touchGroup = null;\nlet gestureDirection = null;\nlet automaticHoldActive = false;\nlet automaticHoldConsumed = false;\nlet gestureMode',
          )
          replace_once(
              "public/src/free-roam-v4.js",
              '  lastTapAt.clear();\n  gestureDirection = null;\n  sendInput(true);',
              '  lastTapAt.clear();\n  gestureDirection = null;\n  automaticHoldActive = false;\n  automaticHoldConsumed = false;\n  sendInput(true);',
          )
          replace_once(
              "public/src/free-roam-v4.js",
              '''function releaseGestureDirection() {
  if (gestureDirection) setControl(gestureDirection, false);
  gestureDirection = null;
}

function beginTouch(event) {''',
              '''function releaseGestureDirection() {
  if (gestureDirection) setControl(gestureDirection, false);
  gestureDirection = null;
}

function syncAutomaticHold() {
  const combat = world?.players?.[playerIndex]?.combat;
  const shouldFire = shouldHoldAutomaticFire({
    pointers: activeTouches.size,
    equipped: combat?.equipped,
    hasAutomatic: combat?.weapons?.automatic,
    ammo: combat?.ammo,
    targetMenuOpen: targetMenu.isOpen(),
  });
  if (shouldFire) {
    automaticHoldConsumed = true;
    if (!automaticHoldActive) {
      automaticHoldActive = true;
      setControl("attack", true);
    }
    return true;
  }
  if (automaticHoldActive) {
    automaticHoldActive = false;
    setControl("attack", false);
  }
  return false;
}

function beginTouch(event) {''',
          )
          replace_once(
              "public/src/free-roam-v4.js",
              '''  touchGroup.maxPointers = Math.max(touchGroup.maxPointers, activeTouches.size);
  if (touchGroup.maxPointers > 1) releaseGestureDirection();
  $("game").setPointerCapture?.(event.pointerId);''',
              '''  touchGroup.maxPointers = Math.max(touchGroup.maxPointers, activeTouches.size);
  if (touchGroup.maxPointers > 1) releaseGestureDirection();
  syncAutomaticHold();
  $("game").setPointerCapture?.(event.pointerId);''',
          )
          replace_once(
              "public/src/free-roam-v4.js",
              '''  activeTouches.delete(event.pointerId);
  if (activeTouches.size > 0) return;

  const group = touchGroup;
  touchGroup = null;
  releaseGestureDirection();
  if (localInput.run) setControl("run", false);
  if (cancelled || !group) return;''',
              '''  activeTouches.delete(event.pointerId);
  syncAutomaticHold();
  if (activeTouches.size > 0) return;

  const group = touchGroup;
  touchGroup = null;
  releaseGestureDirection();
  if (localInput.run) setControl("run", false);
  if (automaticHoldConsumed) {
    automaticHoldConsumed = false;
    return;
  }
  if (cancelled || !group) return;''',
          )
          replace_once(
              "public/src/free-roam-v4.js",
              '''  previousFrame = now;
  if (isHost && world) {''',
              '''  previousFrame = now;
  if (automaticHoldActive) syncAutomaticHold();
  if (isHost && world) {''',
          )
          replace_once(
              "public/src/free-roam-v4.js",
              'from "./free-roam-core-v6.js?v=35";',
              'from "./free-roam-core-v6.js?v=36";',
          )

          replace_once(
              "public/src/free-roam-combat.js",
              '    attackCooldown: 0,\n    injuryMix: 0,',
              '    attackCooldown: 0,\n    automaticTriggerHeld: false,\n    injuryMix: 0,',
          )
          replace_once(
              "public/src/free-roam-combat.js",
              '    if (!Number.isFinite(combat.attackCooldown)) combat.attackCooldown = 0;\n    if (!Number.isFinite(combat.injuryMix))',
              '    if (!Number.isFinite(combat.attackCooldown)) combat.attackCooldown = 0;\n    if (typeof combat.automaticTriggerHeld !== "boolean") combat.automaticTriggerHeld = false;\n    if (!Number.isFinite(combat.injuryMix))',
          )
          replace_once(
              "public/src/free-roam-combat.js",
              '''    if (combat.equipped === "automatic") {
      combat.attackCharge = 0;
      if (input.attack && combat.attackCooldown <= 0) fireAutomatic(world, index, helpers);
      continue;
    }

    if (input.attack) combat.attackCharge = Math.min(1.2, combat.attackCharge + dt);''',
              '''    if (combat.equipped === "automatic") {
      combat.attackCharge = 0;
      combat.automaticTriggerHeld = Boolean(input.attack);
      if (input.attack && combat.attackCooldown <= 0) fireAutomatic(world, index, helpers);
      continue;
    }

    if (combat.automaticTriggerHeld) {
      combat.attackCharge = 0;
      if (!input.attack) combat.automaticTriggerHeld = false;
      continue;
    }

    if (input.attack) combat.attackCharge = Math.min(1.2, combat.attackCharge + dt);''',
          )

          replace_once(
              "public/src/free-roam-core-v6.js",
              'from "./free-roam-combat.js?v=32";',
              'from "./free-roam-combat.js?v=36";',
          )

          html = Path("public/free-roam.html")
          page = html.read_text(encoding="utf-8")
          old_phone = '''<p>На iPhone жесты включены по умолчанию почти на всём экране: свайп с удержанием управляет движением, касание выполняет действие, двойное касание включает прыжок, а удержание даёт сильный удар. Касание двумя пальцами включает сонар; взмах двумя вверх — насос; удержание двумя — пластина; взмах двумя вбок — оружие; двойное касание двумя — состояние; взмах вниз возвращает кнопки. Три пальца — быстрый удар, двойное касание тремя — выбор цели. В выборе цели вертикальный свайп листает, касание подтверждает, два пальца отменяют.</p>'''
          new_phone = '''<p>На iPhone жесты включены по умолчанию почти на всём экране: свайп с удержанием управляет движением, касание выполняет действие, двойное касание включает прыжок, а удержание одним пальцем даёт сильный удар. Касание двумя пальцами включает сонар; взмах двумя вверх — насос; удержание двумя — пластина; взмах двумя вбок переключает оружие; двойное касание двумя озвучивает состояние; взмах вниз возвращает кнопки. С кулаками или ножом три пальца дают быстрый удар. Если выбран автомат, положи три пальца и держи — он стреляет непрерывно; отпусти любой палец — огонь сразу прекращается. Двойное касание тремя открывает выбор цели. В выборе цели вертикальный свайп листает, касание подтверждает, два пальца отменяют.</p>'''
          if old_phone not in page:
              raise SystemExit("missing iPhone help paragraph")
          page = page.replace(old_phone, new_phone, 1)

          old_hint = '''<p id="gestureGuide" class="gesture-hint">Жесты: свайп с удержанием — движение; касание — действие; двойное касание — прыжок; удержание — сильный удар; касание двумя — сонар; двойное касание двумя — состояние; удержание двумя — пластина; взмах двумя вбок — оружие; вверх — насос; вниз — вернуть кнопки; три пальца — быстрый удар.</p>'''
          new_hint = '''<p id="gestureGuide" class="gesture-hint">Жесты: свайп с удержанием — движение; касание — действие; двойное касание — прыжок; удержание одним пальцем — сильный удар; касание двумя — сонар; двойное касание двумя — состояние; удержание двумя — пластина; взмах двумя вбок — переключить оружие; вверх — насос; вниз — вернуть кнопки. Кулаки или нож: три пальца — быстрый удар. Автомат: держи три пальца для непрерывного огня, отпусти любой палец для остановки.</p>'''
          if old_hint not in page:
              raise SystemExit("missing gesture hint")
          page = page.replace(old_hint, new_hint, 1)

          page = page.replace(
              'Сценарий идёт по этапам. Нажми Q: сонар выберет один ящик и не сменит его по дороге.',
              'Сценарий идёт по этапам. На телефоне коснись двумя пальцами, а на компьютере нажми Q: сонар выберет один ящик и не сменит его по дороге.',
              1,
          )
          page = page.replace(
              'С автоматом нажми M, стрелками вверх и вниз выбери игрока, чужую лодку, катер или вышедшего стрелка, затем нажми Enter. Игра только наведёт оружие: стрелять ты начинаешь сам удержанием X.',
              'Для выбора цели на телефоне дважды коснись тремя пальцами; на компьютере нажми M. Выбери игрока, чужую лодку, катер или вышедшего стрелка: на телефоне листай вертикальным свайпом и подтверждай касанием, на компьютере используй стрелки и Enter. Игра только наведёт оружие. На телефоне переключи оружие взмахом двумя пальцами вбок, затем положи три пальца и держи — автомат стреляет непрерывно; отпусти любой палец — огонь прекращается. На компьютере удерживай X.',
              1,
          )
          page = page.replace(
              'Автомат стреляет очередью, пока X удерживается: урон не повышен, но по направлению он достаёт до 420 метров и уверенно захватывает близкую цель.',
              'Автомат стреляет без остановки, пока на телефоне удерживаются три пальца или на компьютере удерживается X: урон не повышен, но по направлению он достаёт до 420 метров и уверенно захватывает близкую цель.',
              1,
          )
          page = page.replace('src/free-roam-v4.js?v=35', 'src/free-roam-v4.js?v=36', 1)
          html.write_text(page, encoding="utf-8")

          tests = Path("tests/free-roam-action-gestures-v25.test.mjs")
          test_text = tests.read_text(encoding="utf-8")
          test_text = test_text.replace(
              'import {classifyActionGesture} from "../public/src/free-roam-action-gestures.js";',
              'import {classifyActionGesture, shouldHoldAutomaticFire} from "../public/src/free-roam-action-gestures.js";',
              1,
          )
          marker = '''test("three-finger taps provide quick and strong attacks", () => {
  assert.equal(classifyActionGesture({pointers: 3, duration: 180, dx: 2, dy: 2, movement: 5}), "attack-light");
  assert.equal(classifyActionGesture({pointers: 3, duration: 680, dx: 3, dy: 2, movement: 5}), "attack-heavy");
});
'''
          addition = marker + '''
test("three held fingers continuously fire only when the automatic is equipped", () => {
  assert.equal(shouldHoldAutomaticFire({pointers: 3, equipped: "automatic", hasAutomatic: true, ammo: 48}), true);
  assert.equal(shouldHoldAutomaticFire({pointers: 2, equipped: "automatic", hasAutomatic: true, ammo: 48}), false);
  assert.equal(shouldHoldAutomaticFire({pointers: 3, equipped: "fists", hasAutomatic: true, ammo: 48}), false);
  assert.equal(shouldHoldAutomaticFire({pointers: 3, equipped: "automatic", hasAutomatic: true, ammo: 0}), false);
  assert.equal(shouldHoldAutomaticFire({pointers: 3, equipped: "automatic", hasAutomatic: true, ammo: 48, targetMenuOpen: true}), false);
});
'''
          if marker not in test_text:
              raise SystemExit("missing gesture test marker")
          test_text = test_text.replace(marker, addition, 1)
          test_text = test_text.replace(
              '  assert.match(client, /actionPulse\\("weapon"\\)/);',
              '  assert.match(client, /actionPulse\\("weapon"\\)/);\n  assert.match(client, /shouldHoldAutomaticFire/);\n  assert.match(client, /automaticHoldConsumed/);',
              1,
          )
          tests.write_text(test_text, encoding="utf-8")
          PY

      - name: Run regression tests
        shell: bash
        run: |
          npm ci
          npm test
          node --check public/src/free-roam-v4.js
          node --check public/src/free-roam-action-gestures.js
          node --check public/src/free-roam-combat.js
          node --check public/src/free-roam-core-v6.js

      - name: Commit verified implementation
        shell: bash
        run: |
          rm .github/workflows/apply-automatic-hold-fire.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Make automatic fire follow three-finger hold"
          git push origin HEAD:agent/automatic-hold-fire

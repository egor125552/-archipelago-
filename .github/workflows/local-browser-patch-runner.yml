name: Local Browser Patch Runner

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch-test-commit:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'agent/fix-throttle-absurdities'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Extract and apply branch patch
        shell: bash
        run: |
          awk '/^[[:space:]]*python3 <<'"'"'PY'"'"'$/{capture=1;next} /^[[:space:]]*PY$/{capture=0} capture{sub(/^          /,"");print}' .github/workflows/apply-throttle-absurdity-fix.yml > /tmp/apply-fix.py
          test -s /tmp/apply-fix.py
          python3 /tmp/apply-fix.py
      - name: Run all Node tests
        shell: bash
        run: |
          npm ci
          set +e
          npm test 2>&1 | tee /tmp/node-test.log
          status=${PIPESTATUS[0]}
          echo "$status" > /tmp/node-test-exit.txt
          exit "$status"
      - name: Upload Node test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: local-node-test-log
          path: |
            /tmp/node-test.log
            /tmp/node-test-exit.txt
          if-no-files-found: error
      - name: Install Chromium
        run: |
          npm install --no-save --package-lock=false playwright@1.52.0
          npx playwright install --with-deps chromium
      - name: Run local mobile Chromium audit
        shell: bash
        run: |
          python3 -m http.server 4173 --directory public > /tmp/archipelago-server.log 2>&1 &
          server_pid=$!
          trap 'kill $server_pid || true' EXIT
          for attempt in {1..40}; do
            if curl -fsS http://127.0.0.1:4173/ >/dev/null; then break; fi
            sleep 0.25
          done
          awk '/^[[:space:]]*node --input-type=module <<'"'"'NODE'"'"'$/{capture=1;next} /^[[:space:]]*NODE$/{capture=0} capture{sub(/^          /,"");print}' .github/workflows/apply-throttle-absurdity-fix.yml > .local-browser-audit.mjs
          test -s .local-browser-audit.mjs
          node .local-browser-audit.mjs 2>&1 | tee /tmp/local-browser-audit.log
      - name: Upload local browser audit log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: local-browser-audit-log
          path: |
            /tmp/local-browser-audit.log
            /tmp/archipelago-server.log
          if-no-files-found: warn
      - name: Commit validated changes to the PR branch
        shell: bash
        run: |
          rm -f .local-browser-audit.mjs .github/workflows/apply-throttle-absurdity-fix.yml
          git config user.name "OpenAI Codex"
          git config user.email "codex@openai.com"
          git add README.md package.json package-lock.json public tests .github/workflows/apply-throttle-absurdity-fix.yml
          git commit -m "Fix throttle release and absurd interactions"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

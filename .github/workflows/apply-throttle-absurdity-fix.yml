name: Apply throttle and absurdity fixes

on:
  push:
    branches:
      - agent/fix-throttle-absurdities

permissions:
  contents: write

jobs:
  patch-test-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Apply focused fixes and tests
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          def replace_once(path, old, new):
              file = Path(path)
              text = file.read_text()
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"Expected one match in {path}, found {count}: {old[:80]!r}")
              file.write_text(text.replace(old, new, 1))

          path = "public/src/game-core-v18.js"
          old = '''export function setControl(state, control, active, actor = "captain") {
            ensureV18State(state);
            if (active && state.refuel.active && ["forward", "reverse", "pump", "rescue", "hullRepair"].includes(control)) {
              state.message = "Сначала отмени заправку.";
              return false;
            }
            return base.setControl(state, control, active, actor);
          }'''
          new = '''export function setControl(state, control, active, actor = "captain") {
            ensureV18State(state);
            if (active && state.refuel.active && ["forward", "reverse", "pump", "rescue", "hullRepair"].includes(control)) {
              state.message = "Сначала отмени заправку.";
              return false;
            }
            if (active && control === "rescue" && state.world?.survivors?.length
              && state.world.survivors.every(item => item.rescued)) {
              state.message = "Все люди уже на борту. Трос больше не нужен; возвращайся в гавань.";
              return false;
            }
            if (active && control === "hullRepair" && state.boat.leak <= 0.05 && state.boat.hull >= 99) {
              state.message = "Корпус цел. Ремонтная пластина сейчас не нужна.";
              return false;
            }
            const result = base.setControl(state, control, active, actor);
            // The hull should coast after release, but the engine must stop
            // producing thrust immediately. Otherwise the boat accelerates for
            // several frames after the player has already let go of the button.
            if (result && !active && control === "forward" && state.boat.throttle > 0) state.boat.throttle = 0;
            if (result && !active && control === "reverse" && state.boat.throttle < 0) state.boat.throttle = 0;
            return result;
          }'''
          replace_once(path, old, new)

          old = '''  if (action === "anchor" && state.phase === "playing" && (state.mode !== "coop" || actor === "captain")) {
              const remaining = state.floatingBrake.readyAt - clock(state);
              if (remaining > 0) {
                return deny(state, `Плавучий тормоз восстанавливается: ${Math.ceil(remaining)} с.`, "brake-cooldown");
              }
              const result = base.command(state, action, actor);
              if (result.ok) state.floatingBrake.readyAt = clock(state) + CONFIG.floatingBrakeCooldown;
              return result;
            }'''
          new = '''  if (action === "anchor" && state.phase === "playing" && (state.mode !== "coop" || actor === "captain")) {
              const remaining = state.floatingBrake.readyAt - clock(state);
              if (remaining > 0) {
                return deny(state, `Плавучий тормоз восстанавливается: ${Math.ceil(remaining)} с.`, "brake-cooldown");
              }
              const alreadyStopped = Math.abs(state.boat.speed) <= CONFIG.motionStopSpeed
                && !state.controls.forward
                && !state.controls.reverse
                && Math.abs(state.boat.throttle) < 0.05;
              if (alreadyStopped) {
                return deny(state, "Лодка уже стоит. Плавучий тормоз не израсходован.", "already-stopped");
              }
              const result = base.command(state, action, actor);
              if (result.ok) state.floatingBrake.readyAt = clock(state) + CONFIG.floatingBrakeCooldown;
              return result;
            }'''
          replace_once(path, old, new)

          old = '''  const previousSpeed = state.boat.speed;
            const previousMessage = state.message;
            const emptyGuard = state.phase === "playing"'''
          new = '''  const previousSpeed = state.boat.speed;
            const previousMessage = state.message;
            const sonarWasUnused = !state.navigation?.lockedTargetId
              && !(state.sonar?.pings > 0)
              && !state.sonar?.lastResult;
            const emptyGuard = state.phase === "playing"'''
          replace_once(path, old, new)

          old = '''  const events = base.step(state, safeDt) || [];
            if (emptyGuard && state.phase === "playing") state.boat.fuel = 0;
            strengthenShoreImpact(state, events, previousSpeed, previousMessage);
            processRefuel(state, safeDt, events);'''
          new = '''  const events = base.step(state, safeDt) || [];
            if (sonarWasUnused && !(state.sonar?.pings > 0)) {
              state.navigation.lockedTargetId = null;
              state.navigation.routeTargetId = null;
              state.navigation.routeStage = 0;
              state.navigation.courseHold = false;
              state.navigation.approachAssist = false;
              for (let index = events.length - 1; index >= 0; index -= 1) {
                if (events[index]?.type === "navigation-cue") events.splice(index, 1);
              }
            }
            if (events.some(event => event.type === "auto-stop")) {
              state.message = "Автотормоз наката погасил инерцию. Лодка полностью остановлена.";
            }
            if (emptyGuard && state.phase === "playing") state.boat.fuel = 0;
            strengthenShoreImpact(state, events, previousSpeed, previousMessage);
            processRefuel(state, safeDt, events);'''
          replace_once(path, old, new)

          for file_name in ["public/index.html", "public/src/app.js"]:
              file = Path(file_name)
              text = file.read_text()
              if "v=23.0" not in text:
                  raise SystemExit(f"No cache generation 23 in {file_name}")
              file.write_text(text.replace("v=23.0", "v=24.0"))

          progression = Path("public/src/progression.js")
          text = progression.read_text()
          if 'name: "Береговой автотормоз"' not in text:
              raise SystemExit("Old coast brake name not found")
          progression.write_text(text.replace('name: "Береговой автотормоз"', 'name: "Автотормоз наката"', 1))

          readme = Path("README.md")
          readme.write_text(readme.read_text().replace("Береговой автотормоз", "Автотормоз наката"))

          for file_name in ["package.json", "package-lock.json"]:
              file = Path(file_name)
              text = file.read_text()
              if '"version": "0.8.3"' not in text:
                  raise SystemExit(f"Version 0.8.3 not found in {file_name}")
              file.write_text(text.replace('"version": "0.8.3"', '"version": "0.8.4"'))

          for file in Path("tests").glob("*.test.mjs"):
              text = file.read_text()
              text = text.replace("v=23.0", "v=24.0")
              text = text.replace("cache generation 23", "cache generation 24")
              text = text.replace("cache v23", "cache v24")
              file.write_text(text)

          Path("tests/absurdity-v24.test.mjs").write_text(r'''import test from "node:test";
          import assert from "node:assert/strict";
          import {readFile} from "node:fs/promises";

          import {
            CONFIG,
            command,
            createGame,
            getView,
            setControl,
            startGame,
            step,
          } from "../public/src/game-core-v18.js";

          function started({level = 2, upgrades = {}} = {}) {
            const state = createGame({mode: "solo", progression: {level, boatId: "strizh", upgrades}});
            startGame(state);
            state.training.safetyEnabled = false;
            return state;
          }

          function run(state, seconds, dt = 0.05) {
            const events = [];
            for (let elapsed = 0; elapsed < seconds && state.phase === "playing"; elapsed += dt) {
              events.push(...step(state, dt));
            }
            return events;
          }

          test("releasing forward removes engine thrust immediately while preserving physical coast", () => {
            const state = started();
            assert.equal(setControl(state, "forward", true), true);
            run(state, 1.3);
            const before = state.boat.speed;
            assert.ok(before > 1);
            assert.ok(state.boat.throttle > 0);
            assert.equal(setControl(state, "forward", false), true);
            assert.equal(state.boat.throttle, 0);
            step(state, 0.25);
            assert.ok(state.boat.speed <= before, `${before} -> ${state.boat.speed}`);
            assert.ok(state.boat.speed > 0, "the hull should still coast");
          });

          test("releasing reverse removes stale reverse thrust", () => {
            const state = started();
            assert.equal(setControl(state, "reverse", true), true);
            run(state, 0.8);
            assert.ok(state.boat.throttle < 0);
            assert.equal(setControl(state, "reverse", false), true);
            assert.equal(state.boat.throttle, 0);
          });

          test("the navigation helper does not secretly lock a target before sonar", () => {
            const state = started();
            assert.equal(state.navigation.lockedTargetId, null);
            const events = run(state, 3);
            assert.equal(state.navigation.lockedTargetId, null);
            assert.equal(state.sonar.pings, 0);
            assert.equal(events.some(event => event.type === "navigation-cue"), false);
            assert.equal(getView(state).navigation.targetDistance, null);
          });

          test("a stationary boat cannot waste the floating brake cooldown", () => {
            const state = started();
            const before = state.floatingBrake.readyAt;
            const result = command(state, "anchor");
            assert.equal(result.ok, false);
            assert.equal(result.reason, "already-stopped");
            assert.equal(state.floatingBrake.readyAt, before);
            assert.equal(getView(state).floatingBrake.ready, true);
            assert.match(state.message, /уже стоит/);
          });

          test("the floating brake still works while moving and repeated use reports cooldown", () => {
            const state = started();
            state.boat.speed = 9;
            const first = command(state, "anchor");
            assert.equal(first.ok, true);
            assert.ok(Math.abs(state.boat.speed) <= 0.12);
            const second = command(state, "anchor");
            assert.equal(second.reason, "brake-cooldown");
          });

          test("rescue rope is rejected after everyone is already aboard", () => {
            const state = started();
            for (const survivor of state.world.survivors) survivor.rescued = true;
            state.rescued = state.world.survivors.length;
            assert.equal(setControl(state, "rescue", true), false);
            assert.equal(state.controls.rescue, false);
            assert.match(state.message, /Все люди уже на борту/);
          });

          test("an intact hull does not enter a fake repair state", () => {
            const state = started();
            state.boat.hull = 100;
            state.boat.leak = 0;
            assert.equal(setControl(state, "hullRepair", true), false);
            assert.equal(state.controls.hullRepair, false);
            assert.match(state.message, /Корпус цел/);
          });

          test("the coast brake uses a logical name and release assets use cache generation 24", async () => {
            const [html, app, progression] = await Promise.all([
              readFile(new URL("../public/index.html", import.meta.url), "utf8"),
              readFile(new URL("../public/src/app.js", import.meta.url), "utf8"),
              readFile(new URL("../public/src/progression.js", import.meta.url), "utf8"),
            ]);
            assert.match(html, /game-core-v18\.js\?v=24\.0/);
            assert.match(html, /app\.js\?v=24\.0/);
            assert.match(app, /progression\.js\?v=24\.0/);
            assert.match(progression, /Автотормоз наката/);
            assert.doesNotMatch(progression, /Береговой автотормоз/);

            const state = started({upgrades: {"coast-brake": true}});
            state.boat.speed = 4;
            const events = run(state, CONFIG.coastBrakeSeconds + 0.2);
            assert.ok(events.some(event => event.type === "auto-stop"));
            assert.match(state.message, /Автотормоз наката/);
          });
          ''')
          PY
      - name: Install dependencies and run unit tests
        run: |
          npm ci
          npm test
      - name: Install Chromium browser test dependency
        run: |
          npm install --no-save --package-lock=false playwright@1.52.0
          npx playwright install --with-deps chromium
      - name: Run browser absurdity audit
        shell: bash
        run: |
          python3 -m http.server 4173 --directory public > /tmp/archipelago-server.log 2>&1 &
          server_pid=$!
          trap 'kill $server_pid || true' EXIT
          for attempt in {1..40}; do
            if curl -fsS http://127.0.0.1:4173/ >/dev/null; then break; fi
            sleep 0.25
          done
          node --input-type=module <<'NODE'
          import {chromium} from "playwright";
          import assert from "node:assert/strict";

          const browser = await chromium.launch({headless: true});
          const context = await browser.newContext({
            viewport: {width: 390, height: 844},
            isMobile: true,
            hasTouch: true,
            locale: "ru-RU",
          });
          const page = await context.newPage();
          const pageErrors = [];
          page.on("pageerror", error => pageErrors.push(String(error)));
          await page.goto("http://127.0.0.1:4173/", {waitUntil: "domcontentloaded"});
          await page.evaluate(() => localStorage.clear());
          await page.reload({waitUntil: "domcontentloaded"});
          await page.locator("#modeTouch").click();
          await page.locator("#soloButton").click();
          await page.waitForFunction(() => window.__echoArchipelago?.getState?.()?.phase === "playing");

          await page.waitForTimeout(2800);
          let snapshot = await page.evaluate(() => {
            const state = window.__echoArchipelago.getState();
            return {locked: state.navigation.lockedTargetId, pings: state.sonar.pings};
          });
          assert.deepEqual(snapshot, {locked: null, pings: 0}, "the game must not invent a sonar lock");

          const throttle = page.locator("#throttleButton");
          await throttle.dispatchEvent("pointerdown", {pointerId: 31, pointerType: "touch", isPrimary: true, button: 0, buttons: 1});
          await page.waitForTimeout(1300);
          const held = await page.evaluate(() => {
            const state = window.__echoArchipelago.getState();
            return {speed: state.boat.speed, throttle: state.boat.throttle, forward: state.controls.forward};
          });
          assert.equal(held.forward, true);
          assert.ok(held.speed > 1);
          await throttle.dispatchEvent("pointerup", {pointerId: 31, pointerType: "touch", isPrimary: true, button: 0, buttons: 0});
          const released = await page.evaluate(() => {
            const state = window.__echoArchipelago.getState();
            return {speed: state.boat.speed, throttle: state.boat.throttle, forward: state.controls.forward};
          });
          assert.equal(released.forward, false);
          assert.equal(released.throttle, 0);
          await page.waitForTimeout(300);
          const coast = await page.evaluate(() => window.__echoArchipelago.getState().boat.speed);
          assert.ok(coast <= released.speed + 0.02, `${released.speed} -> ${coast}`);
          assert.ok(coast > 0);

          await page.evaluate(() => {
            const state = window.__echoArchipelago.getState();
            state.boat.speed = 0;
            state.boat.throttle = 0;
            state.controls.forward = false;
            state.controls.reverse = false;
            state.floatingBrake.readyAt = 0;
          });
          await page.locator("#anchorButton").click();
          snapshot = await page.evaluate(() => {
            const state = window.__echoArchipelago.getState();
            return {message: state.message, readyAt: state.floatingBrake.readyAt};
          });
          assert.match(snapshot.message, /уже стоит/);
          assert.equal(snapshot.readyAt, 0);

          await page.evaluate(() => {
            const state = window.__echoArchipelago.getState();
            for (const survivor of state.world.survivors) survivor.rescued = true;
            state.rescued = state.world.survivors.length;
          });
          await page.locator("#rescueButton").click();
          snapshot = await page.evaluate(() => {
            const state = window.__echoArchipelago.getState();
            return {active: state.controls.rescue, message: state.message};
          });
          assert.equal(snapshot.active, false);
          assert.match(snapshot.message, /Все люди уже на борту/);

          await page.evaluate(() => {
            const state = window.__echoArchipelago.getState();
            state.boat.hull = 100;
            state.boat.leak = 0;
          });
          await page.locator("#repairHullButton").click();
          snapshot = await page.evaluate(() => {
            const state = window.__echoArchipelago.getState();
            return {active: state.controls.hullRepair, message: state.message};
          });
          assert.equal(snapshot.active, false);
          assert.match(snapshot.message, /Корпус цел/);

          assert.deepEqual(pageErrors, []);
          console.log(JSON.stringify({held, released, coast, final: snapshot, pageErrors}, null, 2));
          await browser.close();
          NODE
      - name: Commit validated fixes
        shell: bash
        run: |
          rm .github/workflows/apply-throttle-absurdity-fix.yml
          git config user.name "OpenAI Codex"
          git config user.email "codex@openai.com"
          git add README.md package.json package-lock.json public tests .github/workflows/apply-throttle-absurdity-fix.yml
          git commit -m "Fix throttle release and absurd interactions"
          git push origin HEAD:${GITHUB_REF_NAME}

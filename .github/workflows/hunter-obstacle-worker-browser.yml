name: Hunter Obstacle Worker Browser Audit

on:
  pull_request:
    branches: [main]

jobs:
  browser-only:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'audit/hunter-obstacle-worker'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Chromium
        run: |
          npm install --no-save --package-lock=false playwright@1.52.0
          npx playwright install --with-deps chromium
      - name: Inspect deployed Worker manually in Chromium
        shell: bash
        run: |
          cat > .hunter-obstacle-worker.mjs <<'NODE'
          import assert from 'node:assert/strict';
          import fs from 'node:fs';
          import {chromium} from 'playwright';

          const url = 'https://archipelago.k69ysrndm7.workers.dev/';
          const browser = await chromium.launch({headless: true});
          const pageErrors = [];
          const consoleErrors = [];

          async function waitForGeneration() {
            const context = await browser.newContext();
            const page = await context.newPage();
            let found = false;
            for (let attempt = 0; attempt < 80; attempt += 1) {
              await page.goto(`${url}?generation-check=${Date.now()}`, {waitUntil: 'domcontentloaded'});
              const html = await page.content();
              if (html.includes('app.js?v=26.0')) { found = true; break; }
              await page.waitForTimeout(1500);
            }
            await context.close();
            assert.ok(found, 'Worker did not publish cache generation 26');
          }

          async function startScenario(boatId = 'strizh') {
            const context = await browser.newContext({viewport: {width: 390, height: 844}, isMobile: true, hasTouch: true});
            const page = await context.newPage();
            page.on('pageerror', error => pageErrors.push(error.message));
            page.on('console', message => { if (message.type() === 'error') consoleErrors.push(message.text()); });
            await page.addInitScript(({boatId}) => {
              localStorage.setItem('echo-archipelago-profile-v1', JSON.stringify({
                version: 2, credits: 0, unlockedLevel: 6, selectedLevel: 6, selectedBoat: boatId,
                ownedUpgrades: [], runs: 0, wins: 0, bestScore: 0,
                bestByLevel: {1: 1, 2: 1, 3: 1, 4: 1, 5: 1, 6: 0},
              }));
            }, {boatId});
            await page.goto(`${url}?audit=${Date.now()}`, {waitUntil: 'networkidle'});
            await page.locator('#soloButton').click();
            await page.waitForFunction(() => window.__echoArchipelago?.getState()?.phase === 'playing');
            await page.evaluate(() => {
              window.speechSynthesis?.cancel();
              const state = window.__echoArchipelago.getState();
              state.totalElapsed = 15.2; state.elapsed = 15.2;
              Object.assign(state.boat, {hull: 100, water: 0, leak: 0});
              Object.assign(state.hunter, {
                enabled: true, destroyed: false, hull: 100, maxHull: 100,
                ramCooldown: 0, recoverUntil: 0, repositionUntil: 0, nextCueAt: 999,
              });
              state.hunter.brain.nextDecisionAt = 0;
              state.hunter.avoidance = {
                version: 1, hazardId: null, side: 0, lockedUntil: 0,
                waypointX: 0, waypointY: 0, blocked: false,
                sideChanges: 0, lastSideChangeAt: 0,
              };
            });
            return {page, context};
          }

          async function sample(page, milliseconds, controls = []) {
            await Promise.all(controls.map((selector, index) => page.locator(selector).dispatchEvent('pointerdown', {
              pointerId: index + 1, pointerType: 'touch', isPrimary: index === 0, buttons: 1,
            })));
            const values = [];
            const start = Date.now();
            while (Date.now() - start < milliseconds) {
              values.push(await page.evaluate(() => {
                const state = window.__echoArchipelago.getState();
                const nearestEdge = Math.min(...state.world.hazards.map(hazard =>
                  Math.hypot(state.hunter.x - hazard.x, state.hunter.y - hazard.y) - hazard.radius));
                return {
                  hx: state.hunter.x, hy: state.hunter.y, speed: state.hunter.speed,
                  playerDistance: Math.hypot(state.hunter.x - state.boat.x, state.hunter.y - state.boat.y),
                  playerHull: state.boat.hull, hunterHull: state.hunter.hull,
                  nearestEdge, avoidance: {...state.hunter.avoidance}, tactic: state.hunter.brain.tactic,
                };
              }));
              await page.waitForTimeout(120);
            }
            await Promise.all(controls.map((selector, index) => page.locator(selector).dispatchEvent('pointerup', {
              pointerId: index + 1, pointerType: 'touch', isPrimary: index === 0, buttons: 0,
            })));
            return values;
          }

          function summary(values) {
            let travelled = 0, low = 0, blocked = 0, flips = 0, previousSide = 0;
            for (let index = 1; index < values.length; index += 1) {
              travelled += Math.hypot(values[index].hx - values[index - 1].hx, values[index].hy - values[index - 1].hy);
              if (Math.abs(values[index].speed) < 2) low += 1;
              if (values[index].avoidance.blocked) blocked += 1;
              const side = values[index].avoidance.side;
              if (side && previousSide && side !== previousSide) flips += 1;
              if (side) previousSide = side;
            }
            return {
              travelled,
              lowSpeedFraction: low / Math.max(1, values.length - 1),
              blockedFraction: blocked / Math.max(1, values.length - 1),
              sideFlips: flips,
              internalSideChanges: values.at(-1).avoidance.sideChanges,
              minHazardEdge: Math.min(...values.map(value => value.nearestEdge)),
              minPlayerDistance: Math.min(...values.map(value => value.playerDistance)),
              finalPlayerHull: values.at(-1).playerHull,
              finalHunterHull: values.at(-1).hunterHull,
              finalTactic: values.at(-1).tactic,
            };
          }

          await waitForGeneration();
          const results = {};
          {
            const {page, context} = await startScenario('strizh');
            await page.evaluate(() => {
              const state = window.__echoArchipelago.getState();
              Object.assign(state.boat, {x: -62, y: 170, heading: 0, speed: 0, throttle: 0});
              Object.assign(state.hunter, {x: -128, y: 170, heading: 90, speed: 10});
              state.hunter.brain.nextDecisionAt = 0;
            });
            results.stationary = summary(await sample(page, 17000));
            await context.close();
          }
          {
            const {page, context} = await startScenario('strizh');
            await page.evaluate(() => {
              const state = window.__echoArchipelago.getState();
              Object.assign(state.boat, {x: -64, y: 170, heading: 270, speed: 0, throttle: 0});
              Object.assign(state.hunter, {x: -132, y: 170, heading: 90, speed: 9});
              state.hunter.brain.nextDecisionAt = 0;
            });
            results.reverse = summary(await sample(page, 12000, ['#reverseButton']));
            await context.close();
          }
          {
            const {page, context} = await startScenario('grom');
            await page.evaluate(() => {
              const state = window.__echoArchipelago.getState();
              Object.assign(state.boat, {x: -76, y: 207, heading: 18, speed: 4, throttle: 0});
              Object.assign(state.hunter, {x: -158, y: 150, heading: 20, speed: 12});
              state.hunter.brain.nextDecisionAt = 0;
            });
            results.cluster = summary(await sample(page, 18000, ['#throttleButton', '#rightButton']));
            await context.close();
          }

          assert.equal(pageErrors.length, 0, pageErrors.join(' | '));
          assert.equal(consoleErrors.length, 0, consoleErrors.join(' | '));
          for (const [name, result] of Object.entries(results)) {
            assert.ok(result.blockedFraction > 0.04, `${name}: avoidance did not engage`);
            assert.ok(result.sideFlips <= 3, `${name}: ${result.sideFlips} side flips`);
            assert.ok(result.internalSideChanges <= 3, `${name}: ${result.internalSideChanges} internal flips`);
            assert.ok(result.lowSpeedFraction < 0.42, `${name}: stalled too long`);
            assert.ok(result.minHazardEdge > -0.05, `${name}: penetrated wreck`);
            assert.ok(result.travelled > 28, `${name}: did not navigate`);
          }
          assert.ok(results.stationary.minPlayerDistance < 18, 'wreck became a stationary safe zone');
          assert.ok(results.reverse.minPlayerDistance < 24, 'wreck removed reverse pursuit pressure');

          const report = {generation: 26, results, pageErrors, consoleErrors};
          fs.writeFileSync('/tmp/hunter-obstacle-worker-report.json', JSON.stringify(report, null, 2));
          console.log(JSON.stringify(report, null, 2));
          await browser.close();
          NODE
          node .hunter-obstacle-worker.mjs 2>&1 | tee /tmp/hunter-obstacle-worker.log
      - name: Upload Worker browser evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hunter-obstacle-worker-evidence
          path: |
            /tmp/hunter-obstacle-worker.log
            /tmp/hunter-obstacle-worker-report.json
          if-no-files-found: warn

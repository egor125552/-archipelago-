name: Neural Hunter Worker PR Runner

on:
  pull_request:
    branches: [main]

jobs:
  browser-only:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'audit/neural-worker'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Chromium
        run: |
          npm install --no-save --package-lock=false playwright@1.52.0
          npx playwright install --with-deps chromium
      - name: Audit deployed Worker in mobile Chromium
        shell: bash
        run: |
          awk '/^[[:space:]]*node --input-type=module <<'"'"'NODE'"'"' \| tee \/tmp\/neural-worker-browser-report.log$/{capture=1;next} /^[[:space:]]*NODE$/{capture=0} capture{sub(/^          /,"");print}' .github/workflows/neural-worker-browser-audit.yml > .neural-worker-audit.mjs
          test -s .neural-worker-audit.mjs
          node .neural-worker-audit.mjs 2>&1 | tee /tmp/neural-worker-browser-report.log
      - name: Upload Worker browser evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: neural-worker-browser-evidence-visible
          path: |
            /tmp/neural-worker-browser-report.log
            /tmp/neural-worker-browser-results.json
          if-no-files-found: warn

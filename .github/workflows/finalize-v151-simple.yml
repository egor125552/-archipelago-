name: Finalize Archipelago 1.5.1 generated files

on:
  pull_request:
    branches:
      - main
    types: [reopened, synchronize]

permissions:
  contents: write

jobs:
  finalize:
    if: github.head_ref == 'agent/fix-contract-board-salvage-heavy-shop'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-contract-board-salvage-heavy-shop
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Update generated release files
        run: |
          sed -i 's/free-roam-pistol-audio.js?v=1/free-roam-pistol-audio.js?v=2/' public/free-roam.html
          sed -i 's/free-roam-v4.js?v=49/free-roam-v4.js?v=50/' public/free-roam.html
          sed -i 's/free-roam-core-v6.js?v=42/free-roam-core-v6.js?v=43/' public/src/free-roam-v4.js
          sed -i 's/free-roam-replication.js?v=44/free-roam-replication.js?v=45/' public/src/free-roam-v4.js
          sed -i 's/free-roam-target-menu.js?v=34/free-roam-target-menu.js?v=35/' public/src/free-roam-v4.js
          sed -i 's/free-roam-shop.js?v=1/free-roam-shop.js?v=2/' public/src/free-roam-v4.js
          sed -i 's/free-roam-heavy-pursuer.js?v=1/free-roam-heavy-pursuer.js?v=2/' public/src/free-roam-core-v6.js
          sed -i 's/free-roam-shop.js?v=1/free-roam-shop.js?v=2/' public/src/free-roam-core-v6.js
          npm install --package-lock-only --ignore-scripts
          if git diff --quiet; then
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add package-lock.json public/free-roam.html public/src/free-roam-v4.js public/src/free-roam-core-v6.js
          git commit -m 'Finalize Archipelago 1.5.1 generated files'
          git push origin HEAD:agent/fix-contract-board-salvage-heavy-shop

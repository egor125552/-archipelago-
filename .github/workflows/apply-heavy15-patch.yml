name: Apply heavy threat 1.5.0 patch

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/heavy-threat-1.5.0'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/heavy-threat-1.5.0
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Assemble and verify patch
        run: |
          cat .release/heavy15-patch-*.bin > /tmp/heavy15.patch.bz2
          test "$(wc -c < /tmp/heavy15.patch.bz2)" = "12653"
          echo '029250f772b34ade76ac0995c0d178235620daf86e06ea33f73804aecb07fddb  /tmp/heavy15.patch.bz2' | sha256sum -c -
          bzip2 -dc /tmp/heavy15.patch.bz2 > /tmp/heavy15.patch
          git apply --check /tmp/heavy15.patch
      - name: Apply release and run Node tests
        run: |
          git apply /tmp/heavy15.patch
          npm ci
          npm test
          git diff --check
      - name: Commit clean release
        run: |
          rm -rf .release/heavy15-patch-*.bin
          rm -f .github/workflows/apply-heavy15-patch.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Add heavy threat and elite gunner in 1.5.0'
          git push origin HEAD:agent/heavy-threat-1.5.0

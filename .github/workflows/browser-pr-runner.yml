name: Browser PR Runner

on:
  pull_request:
    branches:
      - main

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Playwright
        run: |
          npm install --no-save playwright@1.52.0
          npx playwright install --with-deps chromium
      - name: Extract and run live Worker audit
        run: |
          awk '/node --input-type=module <<'"'"'NODE'"'"'/{capture=1;next} /^[[:space:]]*NODE$/{capture=0} capture{sub(/^          /,"");print}' .github/workflows/browser-worker-audit.yml > /tmp/browser-worker-audit.mjs
          test -s /tmp/browser-worker-audit.mjs
          node /tmp/browser-worker-audit.mjs

name: Apply free-roam client polish

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/apply-free-roam-polish.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Patch free-roam client
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('public/src/free-roam-v3.js')
          text = path.read_text()

          replacements = [
            ('} from "./free-roam-core-v4.js";', '} from "./free-roam-core-v5.js";'),
            ('import {FreeRoamAudio} from "./free-roam-audio-v3.js";', 'import {FreeRoamAudio} from "./free-roam-audio-v4.js";'),
            ('const localInput = {up: false, down: false, left: false, right: false, pump: false, repair: false, action: false, jump: false};',
             'const localInput = {up: false, down: false, left: false, right: false, run: false, pump: false, repair: false, action: false, jump: false};'),
            ('function connect(role) {\n  audio.init().catch(() => {});\n  isHost = role === "captain";\n  playerIndex = isHost ? 0 : 1;\n  $("hostButton").disabled = true;\n  $("joinButton").disabled = true;\n  announce(isHost ? "Создаю свободный мир…" : "Ищу свободный мир…");',
             'function connect(role) {\n  audio.init().catch(() => {});\n  const requestedRole = role;\n  isHost = requestedRole === "captain";\n  playerIndex = isHost ? 0 : 1;\n  $("hostButton").disabled = true;\n  $("joinButton").disabled = true;\n  announce(requestedRole === "captain" ? "Создаю свободный мир…" : "Ищу свободный мир…");'),
            ('    if (message.type === "lobby-ready") {\n      roomId = message.room || "";\n      $("roomLabel").textContent = `Свободный мир ${roomId}`;\n      if (isHost) {\n        world = createFreeWorld();\n        openGame(message.matched ? "Второй игрок уже подключён." : "Мир создан. Можно ездить одному; ждём второго игрока.");',
             '    if (message.type === "lobby-ready") {\n      roomId = message.room || "";\n      const actualRole = message.role || requestedRole;\n      isHost = actualRole === "captain";\n      playerIndex = isHost ? 0 : 1;\n      $("roomLabel").textContent = `Свободный мир ${roomId}`;\n      if (isHost) {\n        world = createFreeWorld();\n        const openedText = message.matched\n          ? "Свободный мир найден. Ты принял управление миром; второй игрок уже рядом."\n          : requestedRole === "auto"\n            ? "Свободных миров не было. Создан новый мир; ждём второго игрока."\n            : "Мир создан. Можно ездить одному; ждём второго игрока.";\n        openGame(openedText);'),
            ('    if (message.type === "free-input" && isHost && world) {\n      setPlayerInput(world, 1, message.input || {});',
             '    if (message.type === "free-input" && isHost && world) {\n      setPlayerInput(world, 1, message.input || {});'),
            ('    if (message.type === "network-closed") {\n      announce("Второй игрок отключился. Твоя лодка и мир остаются доступны.", true);',
             '    if (message.type === "network-closed") {\n      const waiting = message.waitingFor === "captain" ? "создателя мира" : "второго игрока";\n      announce(`Игрок отключился. Комната сохранена и ждёт ${waiting}.`, true);'),
            ('    if (world) setPlayerInput(world, 0, localInput);', '    if (world) setPlayerInput(world, playerIndex, localInput);'),
            ('    setPlayerInput(world, 0, localInput);', '    setPlayerInput(world, playerIndex, localInput);'),
            ('  for (const name of movementNames) localInput[name] = false;\n  gestureDirection = null;',
             '  for (const name of movementNames) localInput[name] = false;\n  localInput.run = false;\n  gestureDirection = null;'),
            ('  $("speedValue").textContent = myBoat ? Math.abs(myBoat.speed).toFixed(1) : me.mode === "swim" ? "плывёт" : "пешком";',
             '  $("speedValue").textContent = myBoat ? Math.abs(myBoat.speed).toFixed(1) : me.mode === "swim" ? "плывёт" : me.running ? "бежит" : "идёт";'),
            ('  ctx.fillStyle = "#435b3a";\n  ctx.fillRect(0, 0, canvas.width, WORLD.shoreY * sy);',
             '  ctx.fillStyle = "#435b3a";\n  const landMinX = (WORLD.landMinX ?? 0) * sx;\n  const landWidth = ((WORLD.landMaxX ?? WORLD.width) - (WORLD.landMinX ?? 0)) * sx;\n  const landMinY = (WORLD.landMinY ?? 0) * sy;\n  const landHeight = ((WORLD.landMaxY ?? WORLD.shoreY) - (WORLD.landMinY ?? 0)) * sy;\n  ctx.fillRect(landMinX, landMinY, landWidth, landHeight);'),
            ('  const direction = directionFromDelta(point.lastX - point.x, point.lastY - point.y, 26);\n  if (direction) applyGestureDirection(direction);',
             '  const deltaX = point.lastX - point.x;\n  const deltaY = point.lastY - point.y;\n  const direction = directionFromDelta(deltaX, deltaY, 26);\n  if (direction) applyGestureDirection(direction);\n  const longSwipe = Math.hypot(deltaX, deltaY) >= 125;\n  const onFoot = world?.players?.[playerIndex]?.mode === "foot";\n  const shouldRun = Boolean(longSwipe && onFoot);\n  if (localInput.run !== shouldRun) setControl("run", shouldRun);'),
            ('  releaseGestureDirection();\n  if (pumpTap) {', '  releaseGestureDirection();\n  if (localInput.run) setControl("run", false);\n  if (pumpTap) {'),
            ('    const movement = map[event.code] || map[event.key];\n    if (movement) {',
             '    const movement = map[event.code] || map[event.key];\n    if (event.code === "ShiftLeft" || event.code === "ShiftRight") {\n      event.preventDefault();\n      setControl("run", true);\n    } else if (movement) {'),
            ('  window.addEventListener("keyup", event => {\n    const movement = map[event.code] || map[event.key];\n    if (!movement) return;\n    event.preventDefault();\n    setControl(movement, false);',
             '  window.addEventListener("keyup", event => {\n    if (event.code === "ShiftLeft" || event.code === "ShiftRight") {\n      event.preventDefault();\n      setControl("run", false);\n      return;\n    }\n    const movement = map[event.code] || map[event.key];\n    if (!movement) return;\n    event.preventDefault();\n    setControl(movement, false);'),
            ('$("joinButton").addEventListener("click", () => connect("crew"));', '$("joinButton").addEventListener("click", () => connect("auto"));'),
            ('  gestureDirection: () => gestureDirection,\n};',
             '  gestureDirection: () => gestureDirection,\n  isHost: () => isHost,\n  playerIndex: () => playerIndex,\n  audioDiagnostics: () => globalThis.__freeRoamAudioDiagnostics || null,\n};'),
          ]

          for old, new in replacements:
            if old not in text:
              raise SystemExit(f'missing client pattern: {old[:90]!r}')
            text = text.replace(old, new, 1)

          path.write_text(text)

          html = Path('public/free-roam.html')
          page = html.read_text()
          page = page.replace('На компьютере: стрелки удерживают газ и руль, F выполняет действие по ситуации, пробел в лодке сбрасывает плавучий тормоз, C включает насос, V ставит пластину.',
                              'На компьютере: стрелки удерживают газ и руль. На берегу Shift вместе со стрелкой включает бег. F выполняет действие по ситуации, пробел в лодке сбрасывает плавучий тормоз, C включает насос, V ставит пластину.')
          page = page.replace('На iPhone: проведи пальцем и удерживай его в выбранной стороне — лодка продолжит газовать или рулить до отпускания. Короткое касание двумя пальцами переключает насос.',
                              'На iPhone: проведи пальцем и удерживай его в выбранной стороне — лодка продолжит газовать или рулить до отпускания. На берегу длинный свайп с удержанием включает бег, короткий — обычный шаг. Короткое касание двумя пальцами переключает насос.')
          page = page.replace('src/free-roam-v3.js?v=4', 'src/free-roam-v3.js?v=5')
          html.write_text(page)
          PY

          npm ci
          npm test

          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add public/src/free-roam-v3.js public/free-roam.html
          git rm .github/workflows/apply-free-roam-polish.yml
          git commit -m "Polish free-roam lobby, running and gestures"
          git push origin HEAD:main

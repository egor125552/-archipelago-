name: Apply free-roam polish

on:
  push:
    branches: [main]
    paths:
      - tools/apply-free-roam-polish.py
      - .github/workflows/apply-free-roam-polish.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Apply source and test changes
        run: |
          python3 tools/apply-free-roam-polish.py
          python3 - <<'PY'
          from pathlib import Path

          client = Path('public/src/free-roam-v3.js')
          text = client.read_text()
          text = text.replace('    $("joinButton").textContent = rooms.length ? "Войти в ближайший мир" : "Создать или ждать игрока";\n', '')
          client.write_text(text)

          tests = Path('tests/free-roam.e2e.spec.mjs')
          text = tests.read_text()
          text = text.replace(
            '    await newcomer.getByRole("button", {name: "Обновить"}).click();\n    const expectedRoom = await newcomer.evaluate(() => window.__freeRoam.preferredRoom());\n    expect(expectedRoom).toBeTruthy();',
            '    await newcomer.getByRole("button", {name: "Обновить"}).click();\n    await expect.poll(() => newcomer.evaluate(() => window.__freeRoam.preferredRoom())).not.toBe("");\n    const expectedRoom = await newcomer.evaluate(() => window.__freeRoam.preferredRoom());'
          )
          text = text.replace(
            '    await newcomer.getByRole("button", {name: "Обновить"}).click();\n    const staleRoom = await newcomer.evaluate(() => window.__freeRoam.preferredRoom());\n    expect(staleRoom).toBeTruthy();',
            '    await newcomer.getByRole("button", {name: "Обновить"}).click();\n    await expect.poll(() => newcomer.evaluate(() => window.__freeRoam.preferredRoom())).not.toBe("");\n    const staleRoom = await newcomer.evaluate(() => window.__freeRoam.preferredRoom());'
          )
          text = text.replace('    await newcomer.getByRole("button", {name: /Войти|Создать/}).click();', '    await newcomer.locator("#joinButton").click();')
          tests.write_text(text)
          PY

      - name: Run Node regression suite
        run: |
          npm ci
          npm test
          node --check public/src/free-roam-v3.js
          node --check public/src/free-roam-core-v5.js
          node --check public/src/free-roam-audio-v4.js
          node --check src/worker.js

      - name: Commit verified changes
        run: |
          rm tools/apply-free-roam-polish.py
          rm .github/workflows/apply-free-roam-polish.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Polish free-roam rooms, tow physics and spatial feedback"
          git push origin HEAD:main

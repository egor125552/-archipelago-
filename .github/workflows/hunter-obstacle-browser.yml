name: Hunter Obstacle Browser Audit

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  browser-only:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'agent/hunter-obstacle-navigation'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - id: guard
        name: Check browser completion marker
        shell: bash
        run: |
          if git log -1 --pretty=%B | grep -q '\[browser-complete\]'; then
            echo 'complete=true' >> "$GITHUB_OUTPUT"
          else
            echo 'complete=false' >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-node@v4
        if: steps.guard.outputs.complete != 'true'
        with:
          node-version: 22
      - name: Apply obstacle navigation patch
        if: steps.guard.outputs.complete != 'true'
        run: python3 tools/apply-hunter-obstacle-navigation.py
      - name: Install Chromium
        if: steps.guard.outputs.complete != 'true'
        run: |
          npm install --no-save --package-lock=false playwright@1.52.0
          npx playwright install --with-deps chromium
      - name: Run human-like browser scenarios
        if: steps.guard.outputs.complete != 'true'
        shell: bash
        run: |
          python3 -m http.server 4173 --directory public > /tmp/hunter-obstacle-server.log 2>&1 &
          server_pid=$!
          trap 'kill $server_pid || true' EXIT
          for attempt in {1..60}; do
            curl -fsS http://127.0.0.1:4173/ >/dev/null && break
            sleep 0.25
          done
          cat > .hunter-obstacle-browser.mjs <<'NODE'
          import assert from 'node:assert/strict';
          import fs from 'node:fs';
          import {chromium} from 'playwright';

          const browser = await chromium.launch({headless: true});
          const pageErrors = [];
          const consoleErrors = [];

          async function startScenario(boatId = 'strizh') {
            const context = await browser.newContext({
              viewport: {width: 390, height: 844},
              isMobile: true,
              hasTouch: true,
            });
            const page = await context.newPage();
            page.on('pageerror', error => pageErrors.push(error.message));
            page.on('console', message => {
              if (message.type() === 'error') consoleErrors.push(message.text());
            });
            await page.addInitScript(({boatId}) => {
              localStorage.setItem('echo-archipelago-profile-v1', JSON.stringify({
                version: 2,
                credits: 0,
                unlockedLevel: 6,
                selectedLevel: 6,
                selectedBoat: boatId,
                ownedUpgrades: [],
                runs: 0,
                wins: 0,
                bestScore: 0,
                bestByLevel: {1: 1, 2: 1, 3: 1, 4: 1, 5: 1, 6: 0},
              }));
            }, {boatId});
            await page.goto('http://127.0.0.1:4173/', {waitUntil: 'networkidle'});
            await page.locator('#soloButton').click();
            await page.waitForFunction(() => window.__echoArchipelago?.getState()?.phase === 'playing');
            await page.evaluate(() => {
              window.speechSynthesis?.cancel();
              const state = window.__echoArchipelago.getState();
              state.totalElapsed = 15.2;
              state.elapsed = 15.2;
              state.boat.hull = 100;
              state.boat.water = 0;
              state.boat.leak = 0;
              state.hunter.enabled = true;
              state.hunter.destroyed = false;
              state.hunter.hull = 100;
              state.hunter.maxHull = 100;
              state.hunter.ramCooldown = 0;
              state.hunter.recoverUntil = 0;
              state.hunter.repositionUntil = 0;
              state.hunter.nextCueAt = 999;
              state.hunter.brain.nextDecisionAt = 0;
              state.hunter.avoidance = {
                version: 1,
                hazardId: null,
                side: 0,
                lockedUntil: 0,
                waypointX: 0,
                waypointY: 0,
                blocked: false,
                sideChanges: 0,
                lastSideChangeAt: 0,
              };
            });
            return {page, context};
          }

          async function hold(page, selector, milliseconds) {
            const button = page.locator(selector);
            await button.dispatchEvent('pointerdown', {pointerId: 1, pointerType: 'touch', isPrimary: true, buttons: 1});
            await page.waitForTimeout(milliseconds);
            await button.dispatchEvent('pointerup', {pointerId: 1, pointerType: 'touch', isPrimary: true, buttons: 0});
          }

          async function sampleScenario(page, milliseconds, controls = null) {
            const samples = [];
            let controlPromise = null;
            if (controls) {
              const downs = controls.map((selector, index) => page.locator(selector).dispatchEvent('pointerdown', {
                pointerId: index + 1,
                pointerType: 'touch',
                isPrimary: index === 0,
                buttons: 1,
              }));
              await Promise.all(downs);
              controlPromise = async () => {
                await Promise.all(controls.map((selector, index) => page.locator(selector).dispatchEvent('pointerup', {
                  pointerId: index + 1,
                  pointerType: 'touch',
                  isPrimary: index === 0,
                  buttons: 0,
                })));
              };
            }
            const started = Date.now();
            while (Date.now() - started < milliseconds) {
              samples.push(await page.evaluate(() => {
                const state = window.__echoArchipelago.getState();
                const nearestEdge = Math.min(...state.world.hazards.map(hazard =>
                  Math.hypot(state.hunter.x - hazard.x, state.hunter.y - hazard.y) - hazard.radius));
                return {
                  time: state.totalElapsed,
                  hx: state.hunter.x,
                  hy: state.hunter.y,
                  speed: state.hunter.speed,
                  heading: state.hunter.heading,
                  playerDistance: Math.hypot(state.hunter.x - state.boat.x, state.hunter.y - state.boat.y),
                  playerHull: state.boat.hull,
                  hunterHull: state.hunter.hull,
                  nearestEdge,
                  avoidance: {...state.hunter.avoidance},
                  tactic: state.hunter.brain.tactic,
                };
              }));
              await page.waitForTimeout(120);
            }
            if (controlPromise) await controlPromise();
            return samples;
          }

          function summarize(samples) {
            let travelled = 0;
            let lowSpeed = 0;
            let blockedSamples = 0;
            let observedSideFlips = 0;
            let previousSide = 0;
            for (let index = 1; index < samples.length; index += 1) {
              travelled += Math.hypot(samples[index].hx - samples[index - 1].hx, samples[index].hy - samples[index - 1].hy);
              if (Math.abs(samples[index].speed) < 2) lowSpeed += 1;
              if (samples[index].avoidance.blocked) blockedSamples += 1;
              const side = samples[index].avoidance.side;
              if (side && previousSide && side !== previousSide) observedSideFlips += 1;
              if (side) previousSide = side;
            }
            return {
              samples: samples.length,
              travelled,
              lowSpeedFraction: lowSpeed / Math.max(1, samples.length - 1),
              blockedFraction: blockedSamples / Math.max(1, samples.length - 1),
              observedSideFlips,
              internalSideChanges: samples.at(-1).avoidance.sideChanges,
              minHazardEdge: Math.min(...samples.map(sample => sample.nearestEdge)),
              minPlayerDistance: Math.min(...samples.map(sample => sample.playerDistance)),
              finalPlayerHull: samples.at(-1).playerHull,
              finalHunterHull: samples.at(-1).hunterHull,
              finalTactic: samples.at(-1).tactic,
              finalAvoidance: samples.at(-1).avoidance,
            };
          }

          const results = {};

          {
            const {page, context} = await startScenario('strizh');
            await page.evaluate(() => {
              const state = window.__echoArchipelago.getState();
              Object.assign(state.boat, {x: -62, y: 170, heading: 0, speed: 0, throttle: 0});
              Object.assign(state.hunter, {x: -128, y: 170, heading: 90, speed: 10});
              state.hunter.brain.nextDecisionAt = 0;
            });
            results.stationaryBesideWreck = summarize(await sampleScenario(page, 17000));
            await context.close();
          }

          {
            const {page, context} = await startScenario('strizh');
            await page.evaluate(() => {
              const state = window.__echoArchipelago.getState();
              Object.assign(state.boat, {x: -64, y: 170, heading: 270, speed: 0, throttle: 0});
              Object.assign(state.hunter, {x: -132, y: 170, heading: 90, speed: 9});
              state.hunter.brain.nextDecisionAt = 0;
            });
            results.reverseBesideWreck = summarize(await sampleScenario(page, 12000, ['#reverseButton']));
            await context.close();
          }

          {
            const {page, context} = await startScenario('grom');
            await page.evaluate(() => {
              const state = window.__echoArchipelago.getState();
              Object.assign(state.boat, {x: -76, y: 207, heading: 18, speed: 4, throttle: 0});
              Object.assign(state.hunter, {x: -158, y: 150, heading: 20, speed: 12});
              state.hunter.brain.nextDecisionAt = 0;
            });
            results.movingThroughCluster = summarize(await sampleScenario(page, 18000, ['#throttleButton', '#rightButton']));
            await context.close();
          }

          assert.equal(pageErrors.length, 0, `page errors: ${pageErrors.join(' | ')}`);
          assert.equal(consoleErrors.length, 0, `console errors: ${consoleErrors.join(' | ')}`);
          for (const [name, result] of Object.entries(results)) {
            assert.ok(result.blockedFraction > 0.04, `${name}: avoidance never engaged`);
            assert.ok(result.observedSideFlips <= 3, `${name}: side flipped ${result.observedSideFlips} times`);
            assert.ok(result.internalSideChanges <= 3, `${name}: internal side changes ${result.internalSideChanges}`);
            assert.ok(result.lowSpeedFraction < 0.42, `${name}: stalled ${(result.lowSpeedFraction * 100).toFixed(1)}%`);
            assert.ok(result.minHazardEdge > -0.05, `${name}: entered a hazard by ${result.minHazardEdge}`);
            assert.ok(result.travelled > 28, `${name}: travelled only ${result.travelled}`);
          }
          assert.ok(results.stationaryBesideWreck.minPlayerDistance < 18, 'stationary player became a safe zone');
          assert.ok(results.reverseBesideWreck.minPlayerDistance < 24, 'reverse beside wreck removed pursuit pressure');

          const report = {results, pageErrors, consoleErrors};
          fs.writeFileSync('/tmp/hunter-obstacle-browser-report.json', JSON.stringify(report, null, 2));
          console.log(JSON.stringify(report, null, 2));
          await browser.close();
          NODE
          node .hunter-obstacle-browser.mjs 2>&1 | tee /tmp/hunter-obstacle-browser.log
      - name: Upload browser evidence
        if: always() && steps.guard.outputs.complete != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: hunter-obstacle-browser-evidence
          path: |
            /tmp/hunter-obstacle-browser.log
            /tmp/hunter-obstacle-browser-report.json
            /tmp/hunter-obstacle-server.log
          if-no-files-found: warn
      - name: Commit browser-verified navigation
        if: steps.guard.outputs.complete != 'true'
        shell: bash
        run: |
          mkdir -p docs
          cp /tmp/hunter-obstacle-browser-report.json docs/hunter-obstacle-browser-report.json
          rm -f .hunter-obstacle-browser.mjs tools/apply-hunter-obstacle-navigation.py
          git config user.name 'OpenAI Codex'
          git config user.email 'codex@openai.com'
          git add public docs tools
          git commit -m 'Fix hunter obstacle navigation [browser-complete]'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

name: One-shot refresh legacy audits

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/one-shot-refresh-audits.yml

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Refresh stale release audits
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          for path in Path('tests').glob('*.test.mjs'):
              text = path.read_text()
              updated = text.replace('v=24\\.0', 'v=27\\.0')
              updated = updated.replace('cache generation 24', 'cache generation 27')
              updated = updated.replace('cache v24', 'cache v27')
              if updated != text:
                  path.write_text(updated)

          hunter_path = Path('tests/grom-rope-hunter-v20.test.mjs')
          hunter = hunter_path.read_text()
          pattern = re.compile(
              r'test\("the hunter mostly pursues but also patrols, circles, stops and retreats", \(\) => \{.*?\n\}\);',
              re.S,
          )
          replacement = '''test("the hunter uses current neural tactics and keeps pressure on the player", () => {
            const state = grom();
            state.hunter.ramCooldown = 999;
            const samples = [];
            for (let elapsed = 0; elapsed < 80; elapsed += 0.1) {
              step(state, 0.1);
              if (elapsed >= CONFIG.hunterSpawnDelay) samples.push(state.hunter.mode);
            }
            const currentTactics = new Set([
              "pressure", "intercept", "flank-left", "flank-right", "block-objective",
              "counter-circle", "counter-reverse", "bait-ram", "ignore-decoy", "recover",
            ]);
            assert.ok(samples.length > 0);
            assert.ok(samples.every(mode => currentTactics.has(mode)), [...new Set(samples)].join(", "));
            const activePressure = samples.filter(mode => mode !== "recover").length;
            assert.ok(activePressure > samples.length / 2, `${activePressure}/${samples.length}`);
          });'''
          hunter, count = pattern.subn(replacement, hunter, count=1)
          if count != 1:
              raise SystemExit('hunter audit block was not found exactly once')
          hunter_path.write_text(hunter)
          PY

      - name: Verify refreshed audits
        run: |
          npm ci
          npm test

      - name: Commit refreshed tests and remove one-shot workflow
        shell: bash
        run: |
          rm .github/workflows/one-shot-refresh-audits.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add tests .github/workflows/one-shot-refresh-audits.yml
          git commit -m 'Refresh release audits for cache v27 and neural hunter tactics'
          git push origin HEAD:main

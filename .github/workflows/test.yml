name: Test Echo Archipelago

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    if: github.event_name != 'pull_request' || !contains(fromJson('["agent/hunter-obstacle-navigation","audit/hunter-obstacle-worker"]'), github.event.pull_request.head.ref)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - name: Run tests
        run: |
          set +e
          npm test > test-output.txt 2>&1
          code=$?
          cat test-output.txt
          exit $code
      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-output
          path: test-output.txt
          if-no-files-found: error

name: Export contracts worktree

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Pack repository
        run: tar --exclude=.git -czf /tmp/archipelago-worktree.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: archipelago-contracts-worktree
          path: /tmp/archipelago-worktree.tar.gz
          retention-days: 1

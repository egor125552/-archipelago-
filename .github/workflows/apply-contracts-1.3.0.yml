name: Apply contracts 1.3.0

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Verify and apply contracts release
        shell: bash
        run: |
          set -euo pipefail
          exec > >(tee /tmp/contracts-apply.log) 2>&1
          sha256sum .contract-release/*.b64 | tee /tmp/contracts-chunks.txt
          wc -c .contract-release/*.b64 | tee -a /tmp/contracts-chunks.txt
          cat \
            .contract-release/v130-00.b64 \
            .contract-release/v130-01.b64 \
            .contract-release/v130-02.b64 \
            .contract-release/v130-02a.b64 \
            .contract-release/v130-03.b64 \
            .contract-release/v130-04.b64 \
            .contract-release/v130-05.b64 \
            .contract-release/v130-06.b64 \
            .contract-release/v130-07.b64 \
            .contract-release/v130-08.b64 > /tmp/v130.b64
          wc -c /tmp/v130.b64 | tee /tmp/contracts-diagnostic.txt
          base64 -d /tmp/v130.b64 > /tmp/v130.tar.gz
          sha256sum /tmp/v130.tar.gz | tee -a /tmp/contracts-diagnostic.txt
          echo "e2356fcc3be73f799f47c4651e8a550d73e5e8f4555c36c742f00e9ceb132329  /tmp/v130.tar.gz" | sha256sum -c -
          tar -xzf /tmp/v130.tar.gz -C .
          rm -rf .contract-release
          rm -f .github/workflows/export-contracts-worktree.yml
          rm -f .github/workflows/apply-contracts-1.3.0.yml
          rm -f contracts-patch-00.b64
          npm ci
          npm test
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Build contracts board and unique cargo system for 1.3.0"
          git push origin HEAD:${{ github.head_ref }}
      - name: Upload apply diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: contracts-apply-diagnostics
          path: |
            /tmp/contracts-apply.log
            /tmp/contracts-diagnostic.txt
            /tmp/contracts-chunks.txt
          retention-days: 1

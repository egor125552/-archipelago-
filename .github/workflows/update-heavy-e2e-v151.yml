name: Update heavy threat browser expectation

on:
  pull_request:
    branches:
      - main
    types:
      - reopened
      - synchronize

permissions:
  contents: write

jobs:
  update-test:
    if: github.head_ref == 'agent/fix-contract-board-salvage-heavy-shop'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-contract-board-salvage-heavy-shop
          fetch-depth: 0
      - name: Update cooperative heavy hull expectation
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('tests/free-roam.e2e.spec.mjs')
          source = path.read_text()
          old = 'expect(result.heavy).toEqual({hull: 340, maxHull: 340, role: "heavy"});'
          new = 'expect(result.heavy).toEqual({hull: 1000, maxHull: 1000, role: "heavy"});'
          if old not in source:
              raise SystemExit('old heavy expectation not found')
          path.write_text(source.replace(old, new, 1))
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/free-roam.e2e.spec.mjs
          git commit -m "Update heavy threat browser expectation"
          git push origin HEAD:agent/fix-contract-board-salvage-heavy-shop

name: Apply merchant implementation

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/free-roam-merchant-1.2.0'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Verify and apply prepared merchant release
        shell: bash
        run: |
          set -euo pipefail
          cat .merchant-parts/part-* > /tmp/merchant-changes.b64
          base64 --decode /tmp/merchant-changes.b64 > /tmp/merchant-changes.tgz
          echo "27a473ae0bdad90f7de677ab66be46436612a5141ec4004879103f470ba476e7  /tmp/merchant-changes.tgz" | sha256sum --check
          tar -tzf /tmp/merchant-changes.tgz >/dev/null
          tar -xzf /tmp/merchant-changes.tgz -C .
          rm -rf .merchant-parts
          rm -f .github/workflows/export-merchant-workspace.yml
          npm ci
          npm test
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Add merchant economy and shared credits"
          git push origin HEAD:${{ github.head_ref }}

name: Apply merchant implementation

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/free-roam-merchant-1.2.0'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Verify and apply prepared merchant release
        id: apply
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          {
            echo 'Part sizes:'
            wc -c .merchant-parts/part-*
            cat .merchant-parts/part-* > /tmp/merchant-changes.b64
            base64 --decode /tmp/merchant-changes.b64 > /tmp/merchant-changes.tgz
            echo 'Archive digest:'
            sha256sum /tmp/merchant-changes.tgz
            echo "27a473ae0bdad90f7de677ab66be46436612a5141ec4004879103f470ba476e7  /tmp/merchant-changes.tgz" | sha256sum --check
            tar -tzf /tmp/merchant-changes.tgz
            tar -xzf /tmp/merchant-changes.tgz -C .
            python - <<'PY'
          from pathlib import Path
          path = Path('tests/free-roam-shop.test.mjs')
          path.write_text(path.read_text().rstrip() + '\n')
          PY
            rm -rf .merchant-parts
            rm -f .github/workflows/export-merchant-workspace.yml
            npm ci
            npm test
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git diff --cached --check
            git status --short
            git commit -m "Add merchant economy and shared credits"
            git push origin HEAD:${{ github.head_ref }}
          } > merchant-apply.log 2>&1
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: merchant-apply-diagnostics
          path: merchant-apply.log
          retention-days: 1
      - name: Fail when apply failed
        if: steps.apply.outcome == 'failure'
        run: exit 1

name: Focused startup diagnostic

on:
  push:
    branches:
      - debug/free-roam-startup-v160
    paths-ignore:
      - diagnostic-output.txt

permissions:
  contents: write

jobs:
  startup:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Verify exact null-source fix
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('public/src/free-roam-threat-intelligence.js')
          text = path.read_text()
          old = '].filter(source => source?.active !== false && !source?.destroyed);'
          new = '].filter(source => Boolean(source) && source.active !== false && !source.destroyed);'
          if text.count(old) != 1:
              raise SystemExit(f'expected one null-unsafe filter, found {text.count(old)}')
          path.write_text(text.replace(old, new))
          PY
          node --test tests/free-roam-startup-v160.test.mjs
          cp tests/free-roam-startup-v160.test.mjs /tmp/free-roam-startup-v160.test.mjs
      - name: Publish clean hotfix branch
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git fetch origin main
          git checkout -B hotfix/free-roam-startup-null-source origin/main
          python3 - <<'PY'
          from pathlib import Path
          path = Path('public/src/free-roam-threat-intelligence.js')
          text = path.read_text()
          old = '].filter(source => source?.active !== false && !source?.destroyed);'
          new = '].filter(source => Boolean(source) && source.active !== false && !source.destroyed);'
          if text.count(old) != 1:
              raise SystemExit(f'expected one null-unsafe filter, found {text.count(old)}')
          path.write_text(text.replace(old, new))
          PY
          cp /tmp/free-roam-startup-v160.test.mjs tests/__startup-hotfix.test.mjs
          node --test tests/__startup-hotfix.test.mjs
          rm tests/__startup-hotfix.test.mjs
          git add public/src/free-roam-threat-intelligence.js
          git commit -m "Fix free-roam startup null source"
          git push --force-with-lease origin HEAD:hotfix/free-roam-startup-null-source

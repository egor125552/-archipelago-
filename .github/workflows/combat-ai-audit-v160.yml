name: Verify connected combat AI fixes

on:
  push:
    branches:
      - audit/combat-ai-v160
    paths:
      - .github/workflows/combat-ai-audit-v160.yml

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Check current main with only five regressions
        shell: bash
        run: |
          git fetch origin main
          git checkout --detach origin/main
          npm ci
          node --check public/src/free-roam-combat-ai-hotfix-v160.js
          node --check public/src/free-roam-combat-ai-hotfix-v161.js
          node --check public/src/free-roam-combat-ai-hotfix-v162.js
          node --check src/free-roam-server.js
          cat > tests/__combat-ai-first-five-v162.test.mjs <<'TEST'
          import test from "node:test";
          import assert from "node:assert/strict";
          import {createFreeWorld} from "../public/src/free-roam-core-v6.js";
          import {startThreatEncounter} from "../public/src/free-roam-threat-director.js";
          import {activePursuers} from "../public/src/free-roam-pursuer-squad.js";
          import {activeEnemyBoats} from "../public/src/free-roam-enemy-boats.js";
          import {activeHostileActors} from "../public/src/free-roam-hostile-actors.js";
          import {applyCombatAiHotfixV162} from "../public/src/free-roam-combat-ai-hotfix-v162.js";

          function soloWorld() {
            const world = createFreeWorld();
            world.freeActivities.presence = [true, false];
            world.players[0].combat.alive = true;
            world.events = [];
            return world;
          }

          function opening(level) {
            const world = soloWorld();
            startThreatEncounter(world, level, `verify-${level}`);
            applyCombatAiHotfixV162(world, 0.05, {});
            return {
              world,
              pursuers: activePursuers(world),
              boats: activeEnemyBoats(world),
              actors: activeHostileActors(world),
            };
          }

          test("threat five opens stronger than threat four", () => {
            const four = opening(4);
            const five = opening(5);
            assert.equal(five.boats.length, 3);
            assert.ok(five.actors.length > four.actors.length);
            assert.ok(
              five.pursuers.length + five.boats.length + five.actors.length
              > four.pursuers.length + four.boats.length + four.actors.length,
            );
          });

          test("every threat-four boat has physical crew", () => {
            const {pursuers, boats, actors} = opening(4);
            const crewed = new Set(actors.map(actor => String(actor.boatId)));
            for (const boat of [...pursuers, ...boats]) {
              assert.ok(crewed.has(String(boat.id)), `${boat.id} has no physical crew`);
            }
          });

          test("all solo pursuers receive the live player as target", () => {
            const {world, pursuers} = opening(4);
            const assignments = world.freePursuerSquad.assignments;
            assert.equal(Object.keys(assignments).length, pursuers.length);
            assert.deepEqual(new Set(Object.values(assignments)), new Set([0]));
          });

          test("stranded ranged infantry pressures a player boat", () => {
            const world = soloWorld();
            const boat = world.boats[world.players[0].activeBoat];
            Object.assign(world.players[0], {mode: "boat", x: boat.x, y: boat.y});
            world.freeActivities.marauder.active = false;
            world.freePursuerSquad.activated = false;
            world.freeEnemyBoats = {active: false, level: 0, boats: [], projectiles: [], nextProjectileId: 1};
            world.freeHeavyPursuer = {active: false, boat: null, projectiles: [], nextProjectileId: 1};
            world.freeHostileActors = {
              active: true,
              level: 4,
              projectiles: [],
              nextProjectileId: 1,
              actors: [{
                id: "stranded-ranged", boatId: null, targetPlayer: 0,
                x: boat.x + 20, y: 69, heading: 0, state: "foot", weapon: "automatic",
                health: 52, maxHealth: 52, active: true, destroyed: false, elite: false,
                fireCooldown: 0, aimRemaining: 0, burstRemaining: 0, burstCooldown: 0,
                attackCooldown: 0, windupRemaining: 0, targetLockUntil: 9999,
                seatOffset: 0, strandedAt: 0, stepCooldown: 0,
              }],
            };
            applyCombatAiHotfixV162(world, 0.05, {});
            assert.ok(world.freeHostileActors.projectiles.length > 0);
            assert.ok(world.events.some(event => event.type === "enemy-gun-shot"));
          });

          test("roof exposure converts a boat hit into player damage", () => {
            const world = soloWorld();
            const boat = world.boats[world.players[0].activeBoat];
            Object.assign(world.players[0], {mode: "roof", x: boat.x, y: boat.y});
            let damage = 0;
            const helpers = {damagePlayer(_world, index, amount) {
              if (index === 0) damage += amount;
              return true;
            }};
            applyCombatAiHotfixV162(world, 0, helpers);
            boat.hull -= 3;
            world.events.push({
              type: "enemy-bullet-boat-hit",
              targetBoat: boat.id,
              sourcePursuerId: "pursuer-1",
              x: boat.x,
              y: boat.y,
            });
            applyCombatAiHotfixV162(world, 0.05, helpers);
            applyCombatAiHotfixV162(world, 0.05, helpers);
            assert.ok(damage > 0);
          });
          TEST
          node --test tests/__combat-ai-first-five-v162.test.mjs
          rm tests/__combat-ai-first-five-v162.test.mjs
      - name: Publish verification marker
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit --allow-empty -m "Verify five connected combat AI fixes"
          git push --force origin HEAD:verified/combat-ai-first-five-v162

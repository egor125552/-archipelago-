name: Fix contracts transfer chunk

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Correct and verify transferred archive
        shell: bash
        run: |
          set -euo pipefail
          file=.contract-release/v130-07.b64
          test "$(grep -o 'Tb5W683' "$file" | wc -l)" -eq 1
          sed -i 's/Tb5W683/Tb5X683/' "$file"
          cat \
            .contract-release/v130-00.b64 \
            .contract-release/v130-01.b64 \
            .contract-release/v130-02.b64 \
            .contract-release/v130-02a.b64 \
            .contract-release/v130-03.b64 \
            .contract-release/v130-04.b64 \
            .contract-release/v130-05.b64 \
            .contract-release/v130-06.b64 \
            .contract-release/v130-07.b64 \
            .contract-release/v130-08.b64 | base64 -d > /tmp/v130.tar.gz
          echo "e2356fcc3be73f799f47c4651e8a550d73e5e8f4555c36c742f00e9ceb132329  /tmp/v130.tar.gz" | sha256sum -c -
          rm -f .github/workflows/fix-contract-chunk.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$file" .github/workflows/fix-contract-chunk.yml
          git commit -m "Repair contracts release transfer"
          git push origin HEAD:${{ github.head_ref }}

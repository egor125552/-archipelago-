name: Apply Archipelago 1.5.1 PR fixes

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write
  pull-requests: write

jobs:
  apply-fix:
    if: github.head_ref == 'agent/fix-contract-board-salvage-heavy-shop'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-contract-board-salvage-heavy-shop
          fetch-depth: 0
      - name: Apply or clean staged fix archive
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          {
            cat .patch-v151/part-*.b64 | tr -d '[:space:]' | base64 --decode > /tmp/archipelago-fix.zip
            unzip -t /tmp/archipelago-fix.zip
            unzip -o /tmp/archipelago-fix.zip -d "$GITHUB_WORKSPACE"
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            if git diff --quiet -- public/src tests; then
              rm -rf .patch-v151
              git add -A .patch-v151
              if git diff --cached --quiet; then
                echo "Source and staging files are already clean."
                exit 0
              fi
              git commit -m "Remove staged Archipelago fix archive"
              git push origin HEAD:agent/fix-contract-board-salvage-heavy-shop
              exit 0
            fi
            git add public/src/free-roam-core-v6.js \
                    public/src/free-roam-heavy-pursuer.js \
                    public/src/free-roam-pistol-audio.js \
                    public/src/free-roam-replication.js \
                    public/src/free-roam-shop.js \
                    public/src/free-roam-target-menu.js \
                    tests/free-roam-bugfix-v151.test.mjs
            git commit -m "Fix contract navigation, salvage, heavy threat, and shop"
            git push origin HEAD:agent/fix-contract-board-salvage-heavy-shop
          } > /tmp/apply-v151.log 2>&1
          status=$?
          tail -100 /tmp/apply-v151.log
          if [ "$status" -ne 0 ]; then
            {
              echo "Автоматическое применение 1.5.1 завершилось ошибкой:"
              echo
              echo '```text'
              tail -80 /tmp/apply-v151.log
              echo '```'
            } > /tmp/apply-v151-comment.md
            gh pr comment 56 --body-file /tmp/apply-v151-comment.md || true
          fi
          exit "$status"

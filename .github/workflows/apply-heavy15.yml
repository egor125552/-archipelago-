name: Apply heavy threat 1.5.0 release

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/heavy-threat-1.5.0'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/heavy-threat-1.5.0
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Reconstruct and verify patch
        shell: bash
        run: |
          set -euo pipefail
          cat \
            .release/heavy15-part-00.bin \
            .release/heavy15-part-01.bin \
            .release/heavy15-part-02.bin \
            .release/heavy15-part-03.bin \
            .release/heavy15-part-04.bin \
            .release/heavy15-part-05.bin \
            .release/heavy15-part-06.bin \
            .release/heavy15-part-07.bin \
            .release/heavy15-part-08.bin \
            .release/heavy15-part-09.bin \
            .release/heavy15-part-10.bin \
            .release/heavy15-part-11.bin \
            > /tmp/heavy15.patch.gz
          test "$(wc -c < /tmp/heavy15.patch.gz)" -eq 14425
          echo 'b95c970cd551f39c2b202aee1850a2b41d3afa72d938dca20d0b7a012c686e4b  /tmp/heavy15.patch.gz' | sha256sum -c -
          gzip -dc /tmp/heavy15.patch.gz > /tmp/heavy15.patch
          git apply --check /tmp/heavy15.patch
      - name: Apply release and test
        run: |
          set -euo pipefail
          git apply /tmp/heavy15.patch
          npm ci
          npm test
          git diff --check
      - name: Commit clean release
        run: |
          set -euo pipefail
          rm -rf .release/heavy15-part-*.bin .github/workflows/apply-heavy15.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Add heavy threat encounter and elite gunner in 1.5.0'
          git push origin HEAD:agent/heavy-threat-1.5.0
